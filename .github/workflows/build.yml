name: Build

on:
  workflow_dispatch:
  workflow_call:


jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: qrc.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: qrc
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: qrc
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: qrc
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: qrc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          
      - name: Install libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libpipewire-0.3-dev \
            libx11-dev libxrandr-dev libxcursor-dev libxi-dev libxinerama-dev \
            libwayland-dev libgtk-3-dev libgbm-dev
      
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install UPX
        if: runner.os != 'macOS'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            choco install upx -y
          elif [ "$(uname -m)" = "aarch64" ]; then
            curl -sSL https://github.com/upx/upx/releases/download/v5.0.0/upx-5.0.0-arm64_linux.tar.xz | tar -xJ --strip-components=1 -C /usr/local/bin
          else
            curl -sSL https://github.com/upx/upx/releases/download/v5.0.0/upx-5.0.0-amd64_linux.tar.xz | tar -xJ --strip-components=1 -C /usr/local/bin
          fi

      - name: Compress binary
        if: runner.os != 'macOS'
        shell: bash
        run: upx --best target/${{ matrix.target }}/release/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qrc-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}
