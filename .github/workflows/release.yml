name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Package and create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          declare -A archives=(
            [qrc-x86_64-pc-windows-msvc]="qrc-windows-x86_64.zip"
            [qrc-x86_64-unknown-linux-gnu]="qrc-linux-x86_64.tar.gz"
            [qrc-aarch64-unknown-linux-gnu]="qrc-linux-aarch64.tar.gz"
            [qrc-aarch64-apple-darwin]="qrc-macos-aarch64.tar.gz"
            [qrc-x86_64-apple-darwin]="qrc-macos-x86_64.tar.gz"
          )
          for dir in artifacts/qrc-*/; do
            target=$(basename "$dir")
            archive="${archives[$target]}"
            if [ -z "$archive" ]; then continue; fi
            if [[ "$archive" == *.zip ]]; then
              (cd "$dir" && zip "$OLDPWD/$archive" *)
            else
              (cd "$dir" && tar -czf "$OLDPWD/$archive" *)
            fi
          done
          gh release create "${{ inputs.tag }}" \
            --title "Release ${{ inputs.tag }}" \
            --generate-notes \
            qrc-*.tar.gz qrc-*.zip
