name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Package and create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          (cd artifacts/qrc-x86_64-pc-windows-msvc && zip "$OLDPWD/qrc-windows-x86_64.zip" *)
          (cd artifacts/qrc-x86_64-unknown-linux-gnu && tar -czf "$OLDPWD/qrc-linux-x86_64.tar.gz" *)
          (cd artifacts/qrc-aarch64-unknown-linux-gnu && tar -czf "$OLDPWD/qrc-linux-aarch64.tar.gz" *)
          (cd artifacts/qrc-aarch64-apple-darwin && tar -czf "$OLDPWD/qrc-macos-aarch64.tar.gz" *)
          (cd artifacts/qrc-x86_64-apple-darwin && tar -czf "$OLDPWD/qrc-macos-x86_64.tar.gz" *)
          gh release create "${{ inputs.tag }}" \
            --title "Release ${{ inputs.tag }}" \
            --generate-notes \
            qrc-*.tar.gz qrc-*.zip
