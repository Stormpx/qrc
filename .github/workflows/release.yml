name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Package and create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd artifacts
          # Rename and package artifacts
          for dir in qrc-*/; do
            target="${dir%/}"
            name="${target#qrc-}"
            case "$name" in
              x86_64-pc-windows-msvc) archive="qrc-windows-x86_64.zip" ;;
              x86_64-unknown-linux-gnu) archive="qrc-linux-x86_64.tar.gz" ;;
              aarch64-unknown-linux-gnu) archive="qrc-linux-aarch64.tar.gz" ;;
              aarch64-apple-darwin) archive="qrc-macos-aarch64.tar.gz" ;;
              x86_64-apple-darwin) archive="qrc-macos-x86_64.tar.gz" ;;
            esac
            if [[ "$archive" == *.zip ]]; then
              cd "$dir" && zip "../../$archive" * && cd ..
            else
              cd "$dir" && tar -czf "../../$archive" * && cd ..
            fi
          done
          cd ..
          gh release create "${{ inputs.tag }}" \
            --title "Release ${{ inputs.tag }}" \
            --generate-notes \
            qrc-*.tar.gz qrc-*.zip
